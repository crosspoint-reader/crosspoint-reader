name: Compile Release
on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Install PlatformIO Core
        run: uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Build CrossPoint
        env:
          CROSSPOINT_RELEASE_VERSION: ${{ github.ref_name }}
        run: pio run -e gh_release

      - name: Create Draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          title="CrossPoint ${tag}"
          notes_file="$(mktemp)"

          cat > "$notes_file" <<EOF
          Firmware build for ${tag}.

          Primary install artifact:
          - firmware.bin

          Additional build artifacts:
          - bootloader.bin
          - partitions.bin
          - firmware.elf
          - firmware.map
          EOF

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file "$notes_file"
          else
            gh release create "$tag" --draft --verify-tag --title "$title" --notes-file "$notes_file"
          fi

          gh release upload "$tag" \
            ".pio/build/gh_release/firmware.bin#firmware.bin" \
            ".pio/build/gh_release/bootloader.bin#bootloader.bin" \
            ".pio/build/gh_release/partitions.bin#partitions.bin" \
            ".pio/build/gh_release/firmware.elf#firmware.elf" \
            ".pio/build/gh_release/firmware.map#firmware.map" \
            --clobber

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CrossPoint-${{ github.ref_name }}
          path: |
            .pio/build/gh_release/bootloader.bin
            .pio/build/gh_release/firmware.bin
            .pio/build/gh_release/firmware.elf
            .pio/build/gh_release/firmware.map
            .pio/build/gh_release/partitions.bin
