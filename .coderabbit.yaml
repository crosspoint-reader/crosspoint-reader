# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "en-GB"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  review_details: true
  poem: false
  pre_merge_checks:
    docstrings:
      mode: "off"
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    auto_incremental_review: true
  path_filters:
    - "!fs_/**"
    - "!.pio/**"
    - "!lib/I18n/I18nKeys.h"
    - "!lib/I18n/I18nStrings.*"
    - "!src/network/html/**/*.generated.h"
  path_instructions:
    - path: "src/activities/**"
      instructions: >
        This is ESP32 e-reader firmware organised around Activity subclasses and ActivityManager navigation.
        Check that menu item order, rendered labels/icons, and dispatch indices stay in sync, especially when
        optional OPDS entries are present. Prefer small, simulator-testable changes.
    - path: "lib/I18n/translations/*.yaml"
      instructions: >
        Translation YAML files are the source of truth. Generated I18n headers and string tables are ignored and
        regenerated by PlatformIO pre-build scripts. Do not request committed generated i18n files.
    - path: "platformio.ini"
      instructions: >
        This project targets ESP32-C3 firmware and a macOS native simulator. Be careful with changes that increase
        firmware flash/RAM usage or make simulator-only flags affect the hardware build.
    - path: "src/activities/writer/**"
      instructions: >
        Writer mode is being developed incrementally. For now, prefer small MVP-focused feedback around navigation,
        rendering, input handling, SD-card draft safety, and memory use. Avoid suggesting broad editor features unless
        they are necessary for the current slice.

chat:
  auto_reply: true
