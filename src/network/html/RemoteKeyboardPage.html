<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrossPoint Remote Keyboard</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #111111;
        --paper: #f4f1e8;
        --panel: #fffdf7;
        --line: #2f2a24;
        --muted: #6d6458;
        --accent: #274c77;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        background:
          radial-gradient(circle at top, rgba(39, 76, 119, 0.08), transparent 38%),
          linear-gradient(180deg, #f8f5ee 0%, var(--paper) 100%);
        color: var(--ink);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .shell {
        width: min(100%, 640px);
        background: var(--panel);
        border: 2px solid var(--line);
        box-shadow: 8px 8px 0 rgba(17, 17, 17, 0.12);
        padding: 24px;
      }

      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(28px, 5vw, 40px);
        line-height: 1;
      }

      .status {
        min-height: 20px;
        margin-bottom: 16px;
        color: var(--muted);
        font-size: 14px;
      }

      .field-label {
        display: block;
        font-size: 13px;
        margin-bottom: 8px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        padding: 16px;
        border: 2px solid var(--line);
        border-radius: 0;
        background: #ffffff;
        color: var(--ink);
      }

      input[hidden],
      textarea[hidden] {
        display: none;
      }

      input {
        height: 56px;
      }

      textarea {
        resize: vertical;
        min-height: 180px;
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 16px;
        flex-wrap: wrap;
      }

      button {
        border: 2px solid var(--line);
        background: var(--accent);
        color: #ffffff;
        padding: 14px 18px;
        cursor: pointer;
        min-width: 160px;
      }

      button.secondary {
        background: transparent;
        color: var(--ink);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .small {
        margin-top: 16px;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="eyebrow">CrossPoint Remote Keyboard</div>
      <h1 id="title">Waiting for device input</h1>
      <div class="status" id="status">Connecting...</div>
      <label class="field-label" for="textInput">Text</label>
      <input id="textInput" hidden disabled />
      <textarea id="textArea" placeholder="Waiting for an active text session..." disabled></textarea>
      <div class="actions">
        <button id="submitBtn" disabled>Send To Device</button>
        <button id="refreshBtn" class="secondary" type="button">Refresh</button>
      </div>
      <div class="small" id="meta">Keep this page open while the device waits for text.</div>
    </main>
    <script>
      let activeSession = null;
      let activeField = null;

      const titleNode = document.getElementById("title");
      const statusNode = document.getElementById("status");
      const textInput = document.getElementById("textInput");
      const textArea = document.getElementById("textArea");
      const submitBtn = document.getElementById("submitBtn");
      const refreshBtn = document.getElementById("refreshBtn");
      const metaNode = document.getElementById("meta");

      function sessionLabel(session) {
        if (!session) return "No active text session";
        return session.title || "Remote text input";
      }

      function setStatus(message) {
        statusNode.textContent = message;
      }

      function fieldValue() {
        return activeField ? activeField.value : "";
      }

      function setFieldValue(value) {
        textInput.value = value;
        textArea.value = value;
      }

      function setFieldMode(session) {
        const useSingleLine = !!session && (session.isPassword || (session.maxLength > 0 && session.maxLength <= 120));
        textInput.hidden = !useSingleLine;
        textArea.hidden = useSingleLine;
        activeField = useSingleLine ? textInput : textArea;
        textInput.type = session && session.isPassword ? "password" : "text";
        textInput.disabled = !session;
        textArea.disabled = !session;

        if (session && session.maxLength > 0) {
          textInput.maxLength = session.maxLength;
          textArea.maxLength = session.maxLength;
        } else {
          textInput.removeAttribute("maxLength");
          textArea.removeAttribute("maxLength");
        }
      }

      async function fetchSession() {
        const response = await fetch("/api/remote-keyboard/session", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Session lookup failed");
        }
        return await response.json();
      }

      async function claimSession(session) {
        const response = await fetch("/api/remote-keyboard/claim", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: session.id, client: "browser" }),
        });
        if (!response.ok) {
          throw new Error("Claim failed");
        }
        return await response.json();
      }

      async function submitSession() {
        if (!activeSession) return;
        submitBtn.disabled = true;
        setStatus("Sending text to device...");
        const response = await fetch("/api/remote-keyboard/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: activeSession.id, text: fieldValue() }),
        });
        if (!response.ok) {
          const message = await response.text();
          throw new Error(message || "Submit failed");
        }
        setStatus("Text sent. The device should continue immediately.");
      }

      function applySession(session) {
        activeSession = session && session.active ? session : null;
        titleNode.textContent = sessionLabel(activeSession);

        if (!activeSession) {
          setFieldMode(null);
          setFieldValue("");
          submitBtn.disabled = true;
          metaNode.textContent = "Open a text field on the device, then refresh this page.";
          setStatus("No active text session.");
          return;
        }

        setFieldMode(activeSession);
        if (document.activeElement !== activeField) {
          setFieldValue(activeSession.text || "");
        }

        submitBtn.disabled = false;
        metaNode.textContent = activeSession.maxLength > 0
          ? "Maximum length: " + activeSession.maxLength + " characters."
          : "No input length limit.";
        setStatus(activeSession.claimedBy === "browser"
          ? "Connected. Use this field and send the result."
          : "Connected. This page is now controlling the device input.");
        activeField.focus({ preventScroll: true });
      }

      async function refreshSession() {
        try {
          const session = await fetchSession();
          applySession(session);
          if (activeSession) {
            const claimed = await claimSession(activeSession);
            applySession(claimed);
          }
        } catch (error) {
          setStatus(error.message || "Connection failed");
        }
      }

      function bindSubmitShortcut(field) {
        field.addEventListener("keydown", (event) => {
          if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
            event.preventDefault();
            submitBtn.click();
            return;
          }

          if (field === textInput && event.key === "Enter") {
            event.preventDefault();
            submitBtn.click();
          }
        });
      }

      bindSubmitShortcut(textInput);
      bindSubmitShortcut(textArea);

      submitBtn.addEventListener("click", async () => {
        try {
          await submitSession();
        } catch (error) {
          setStatus(error.message || "Submit failed");
          submitBtn.disabled = false;
        }
      });

      refreshBtn.addEventListener("click", () => { refreshSession(); });

      window.setInterval(refreshSession, 1000);
      refreshSession();
    </script>
  </body>
</html>
